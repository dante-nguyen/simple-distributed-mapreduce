services:
  master:
    container_name: master
    build:
      context: .
      dockerfile: build/master/Dockerfile
    command:
      - "--port"
      - "${MASTER_PORT}"
      - "--advertise-address"
      - "${MASTER_HOST}:${MASTER_PORT}"
      - "--healthy-duration"
      - "10s"
      - "--nfs-root"
      - "${NFS_ROOT}"
      - "--input"
      - "**/*.txt"
    volumes:
      - ${HOST_IN_DIR}:${NFS_ROOT}:z

  worker-1:
    container_name: worker-1
    build:
      context: .
      dockerfile: build/worker/Dockerfile
    command:
      - "--name"
      - "worker-1"
      - "--port"
      - "5000"
      - "--advertise-address"
      - "worker-1:5000"
      - "--master-address"
      - "${MASTER_HOST}:${MASTER_PORT}"
      - "--heartbeat-interval"
      - "5s"
      - "--heartbeat-timeout"
      - "3s"
      - "--nfs-root"
      - "${NFS_ROOT}"
    volumes:
      - ${HOST_IN_DIR}:${NFS_ROOT}:z
    depends_on:
      - master

  worker-2:
    container_name: worker-2
    build:
      context: .
      dockerfile: build/worker/Dockerfile
    command:
      - "--name"
      - "worker-2"
      - "--port"
      - "5000"
      - "--advertise-address"
      - "worker-2:5000"
      - "--master-address"
      - "${MASTER_HOST}:${MASTER_PORT}"
      - "--heartbeat-interval"
      - "2s"
      - "--heartbeat-timeout"
      - "1s"
      - "--nfs-root"
      - "${NFS_ROOT}"
    volumes:
      - ${HOST_IN_DIR}:${NFS_ROOT}:z
    depends_on:
      - master

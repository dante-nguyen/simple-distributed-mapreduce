syntax = "proto3";

package rpc.v1;

option go_package = "github.com/nlduy0310/simple-distributed-mapreduce/rpc/v1;rpcv1";

service WorkerService {
  rpc Ping(PingRequest) returns (PingResponse) {}
  rpc Map(MapRequest) returns (MapResponse) {}
}

message MapRequest {
  string nfs_path = 1;
}

message MapResponse {
  bool ok = 1;
  string reason = 2;
}

message PingRequest {
  string message = 1;
}

message PingResponse {
  string message = 1;
}

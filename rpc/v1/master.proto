syntax = "proto3";

package rpc.v1;

option go_package = "github.com/nlduy0310/simple-distributed-mapreduce/rpc/v1;rpcv1";

service MasterService {
  rpc Register(RegisterRequest) returns (RegisterResponse) {}
}

message RegisterRequest {
  string name = 1;
  string address = 2;
}

message RegisterResponse {
  bool ok = 1;
}
